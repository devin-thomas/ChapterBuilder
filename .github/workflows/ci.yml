name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  build-and-package:
    name: Build and package (win-x64)
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore .\TwoXKOChapterBuilder.csproj --runtime win-x64

      - name: Build
        shell: pwsh
        run: |
          dotnet build .\TwoXKOChapterBuilder.csproj --configuration Release --runtime win-x64 --no-restore 2>&1 |
            Tee-Object -FilePath .\build.log
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upload failed build log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ChapterBuilder-build-log
          path: build.log
          if-no-files-found: error
          retention-days: 7

      - name: Create portable package
        shell: pwsh
        run: .\scripts\Publish.ps1 -Version "0.1.0-ci.${{ github.run_number }}" -NoRestore

      - name: Verify release assets
        shell: pwsh
        run: |
          $expected = @(
            '.\artifacts\2XKOChapterBuilder.exe',
            '.\artifacts\ChapterBuilder-win-x64-v0.1.0-ci.${{ github.run_number }}.zip',
            '.\artifacts\SHA256SUMS.txt'
          )
          foreach ($path in $expected) {
            if (-not (Test-Path $path -PathType Leaf)) {
              throw "Missing expected release asset: $path"
            }
          }

      - name: Upload portable build
        uses: actions/upload-artifact@v7
        with:
          name: ChapterBuilder-win-x64
          path: |
            artifacts/2XKOChapterBuilder.exe
            artifacts/ChapterBuilder-win-x64-*.zip
            artifacts/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14
